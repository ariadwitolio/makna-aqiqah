name: Deploy apps/web to Cloudflare

# Runs whenever apps/web changes on main — including commits Decap CMS
# itself makes when an editor hits "Save". Does the same build -> deploy ->
# populateCache sequence documented in docs/DEPLOYMENT.md, as one atomic
# step (never split these across separate jobs/runs — see that doc for why).
on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci

      - run: npm run deploy
        env:
          NEXT_PUBLIC_DECAP_AUTH_BASE_URL: ${{ secrets.NEXT_PUBLIC_DECAP_AUTH_BASE_URL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
