# Source of truth for apps/web/public/admin/config.yml.
# Generated by scripts/generate-decap-config.mjs — do not edit the generated
# file directly, edit this template instead.
#
# local_backend: true makes Decap CMS auto-detect `npm run cms:proxy`
# (decap-server) on localhost and read/write through it instead of GitHub, so
# no OAuth is needed for local development. In production the same config
# talks to GitHub directly, authenticated via the Cloudflare Worker at
# base_url (see workers/decap-oauth).
backend:
  name: github
  repo: ariadwitolio/makna-aqiqah
  branch: main
  base_url: __DECAP_AUTH_BASE_URL__
  auth_endpoint: auth

local_backend: true

# No editorial_workflow: this is a single-admin site with no need for a
# draft/review queue, and editorial_workflow's draft-cleanup step has a
# known bug with single-file collections (Home Page, Site Settings) that
# throws "Not allowed to delete entries in this collection" on publish.
# Omitting publish_mode defaults to "simple" — Save commits straight to
# main, no separate publish step.

# Paths below are relative to the repo root (ariadwitolio/makna-aqiqah),
# not to apps/web — this is a monorepo, so the app's own subdirectory must
# be included explicitly. public_folder is a URL path, not a repo path, so
# it's unaffected.
media_folder: apps/web/public/uploads
public_folder: /uploads

collections:
  - name: homepage
    label: Home Page
    files:
      - file: apps/web/content/homepage/index.md
        name: homepage
        label: Home Page
        fields:
          - { label: Badge Label, name: badgeLabel, widget: string }
          - { label: Hero Title, name: heroTitle, widget: string }
          - { label: Hero Subtitle, name: heroSubtitle, widget: text }
          - { label: Hero CTA Label, name: heroCtaLabel, widget: string }
          - { label: Hero CTA Link, name: heroCtaHref, widget: string, hint: "e.g. https://wa.me/62812... or #packages" }
          - { label: Hero Secondary CTA Label, name: heroSecondaryCtaLabel, widget: string }
          - { label: Hero Secondary CTA Link, name: heroSecondaryCtaHref, widget: string, hint: "e.g. https://wa.me/62812... or #packages" }
          - { label: Hero Image, name: heroImage, widget: image, required: false }

          - { label: Highlight Section Title, name: highlightTitle, widget: string }
          - { label: Highlight Section Description, name: highlightDescription, widget: string }
          - label: Highlights
            name: highlights
            widget: list
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
              - label: Icon
                name: icon
                widget: select
                default: sparkles
                options: __LUCIDE_ICON_OPTIONS__

          - { label: Services Eyebrow, name: servicesEyebrow, widget: string }
          - { label: Services Title, name: servicesTitle, widget: string }
          - { label: Services Description, name: servicesDescription, widget: text }
          - { label: Services Secondary Description, name: servicesSecondaryDescription, widget: text }
          - { label: Services Image, name: servicesImage, widget: image, required: false, hint: "Shown below the secondary description" }
          - label: Services
            name: services
            widget: list
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
              - label: Icon
                name: icon
                widget: select
                default: sparkles
                options: __LUCIDE_ICON_OPTIONS__

          - { label: Packages Eyebrow, name: packagesEyebrow, widget: string }
          - { label: Packages Title, name: packagesTitle, widget: string }
          - { label: Packages Description, name: packagesDescription, widget: text }
          - label: Packages
            name: packages
            widget: list
            fields:
              - { label: Name, name: name, widget: string }
              - { label: Price Notes, name: priceNotes, widget: string, required: false, hint: "e.g. Mulai dari — shown before the currency" }
              - { label: Price Currency, name: priceCurrency, widget: string, hint: "e.g. Rp" }
              - { label: Price Nominal, name: priceNominal, widget: string, hint: "e.g. 2.250.000 or 3.6 Juta — the emphasized part" }
              - { label: Description, name: description, widget: text }
          - { label: Packages Contact Text, name: packagesContactText, widget: string }
          - { label: Packages Contact CTA Label, name: packagesContactCtaLabel, widget: string }
          - { label: Packages Contact CTA Link, name: packagesContactCtaHref, widget: string }

          - { label: Order Flow Eyebrow, name: orderFlowEyebrow, widget: string }
          - { label: Order Flow Title, name: orderFlowTitle, widget: string }
          - { label: Order Flow Description, name: orderFlowDescription, widget: text }
          - label: Order Flow Steps
            name: orderFlowSteps
            widget: list
            fields:
              - label: Icon
                name: icon
                widget: select
                default: sparkles
                options: __LUCIDE_ICON_OPTIONS__
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }

          - { label: Info Eyebrow, name: infoEyebrow, widget: string }
          - { label: Info Title, name: infoTitle, widget: string }
          - { label: Info Description, name: infoDescription, widget: text }

          - { label: Testimonials Eyebrow, name: testimonialsEyebrow, widget: string }
          - { label: Testimonials Title, name: testimonialsTitle, widget: string }
          - label: Testimonials Description
            name: testimonialsDescription
            widget: text
            hint: "Individual testimonials are managed in the Testimonials collection."

          - { label: Gallery Eyebrow, name: galleryEyebrow, widget: string }
          - { label: Gallery Title, name: galleryTitle, widget: string }
          - { label: Gallery Description, name: galleryDescription, widget: text }
          - label: Gallery Images
            name: galleryImages
            widget: list
            fields:
              - { label: Image, name: image, widget: image }
              - { label: Caption, name: caption, widget: string, required: false }
              - label: Tile Size
                name: size
                widget: select
                default: normal
                options: [normal, wide, tall, large]

          - { label: CTA Title, name: ctaTitle, widget: string }
          - { label: CTA Description, name: ctaDescription, widget: text }
          - { label: CTA Button Label, name: ctaButtonLabel, widget: string }
          - { label: CTA Button Link, name: ctaButtonHref, widget: string }

  - name: settings
    label: Site Settings
    files:
      - file: apps/web/content/settings/site.md
        name: site
        label: Site Settings
        fields:
          - { label: Logo, name: logo, widget: image, required: false }
          - { label: Favicon, name: favicon, widget: image, required: false, hint: "Browser tab icon, square image recommended" }
          - { label: Site Name, name: siteName, widget: string }
          - { label: Tagline, name: tagline, widget: string }
          - label: Nav Links
            name: navItems
            widget: list
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Link, name: href, widget: string }
          - { label: Nav Button Label, name: navCtaLabel, widget: string }
          - { label: Nav Button Link, name: navCtaHref, widget: string }
          - { label: Company Name, name: companyName, widget: string }
          - { label: WhatsApp Number, name: whatsapp, widget: string, required: false, hint: "International format without symbols, e.g. 6281234567890" }
          - { label: Instagram URL, name: instagram, widget: string, required: false }
          - { label: Facebook URL, name: facebook, widget: string, required: false }
          - { label: TikTok URL, name: tiktok, widget: string, required: false }
          - { label: Address, name: address, widget: text, required: false }
          - { label: Operational Hours, name: operationalHours, widget: string, required: false }

  - name: testimonials
    label: Testimonials
    folder: apps/web/content/testimonials
    create: true
    slug: "{{slug}}"
    identifier_field: name
    fields:
      - { label: Photo, name: photo, widget: image }
      - { label: Testimonial, name: quote, widget: text }
      - { label: Name, name: name, widget: string }
